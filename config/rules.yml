---
transfer:
  enabled: true
  # Match parziale (case-insensitive) sulla descrizione raw originale del movimento.
  description_raw_keywords:
    - "conto deposito"
    - "giroconto"
    - "trasferimento interno"
    - "versamento su conto deposito"
    - "versamento da conto deposito"
    - "versamento su progetto"
    - "versamento da progetto"
    - "versamento ricorrente su"
  # Match esatto (case-insensitive) sulla descrizione raw.
  description_raw_exact: []

categorization:
  # Sotto questa soglia la categoria viene forzata ad "Altro" (modelli piccoli spesso danno confidence basse).
  confidence_threshold: 0.42
  # Parallelismo richieste LM (1 = sequenziale). La GPU/CPU locale potrebbe degradare con troppi job.
  parallel_jobs: 1
  # Match parziale (case-insensitive, senza accenti) su description_clean; fallback su description_raw.
  # Se c'e' match, la categoria viene assegnata prima dell'LLM e il movimento non viene inviato al modello.
  description_category_includes:
    "mega masera": "Supermercato e alimentari"
    "pratica numero pag0000000208346915": "Affitto e mutuo"

